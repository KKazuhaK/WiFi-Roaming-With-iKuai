# docker-compose.yml (内网方案)
#
# 在每个站点的 LAN 盒子 (Pi / NAS / 软路由 / 小 x86) 上跑这一份.
# iKuai 那边配静态 DNS 把 wifi.login.example.com 劫持到这个盒子的 LAN IP,
# 连上 SSID 的设备就通过 LAN 访问 Portal, 完全不走公网.
#
# 目录布局 (假设放 /opt/wifi-portal-intranet):
#   /opt/wifi-portal-intranet/
#   ├── docker-compose.yml       <- 本文件
#   ├── Caddyfile                <- Caddy 配置
#   ├── Dockerfile.caddy         <- 带 cloudflare 插件的 Caddy 镜像
#   ├── .env                     <- 从 .env.example 拷贝并填值
#   └── portal/                  <- 从仓库根 portal/ 拷过来 (或 git clone 整个仓库)
#
# 常用命令:
#   docker compose up -d --build         首次启动
#   docker compose logs -f caddy         看证书申请进度
#   docker compose logs -f portal        看 Portal 日志
#   docker compose restart portal        只改了 .env 时
#   docker compose down                  停掉 (保留 volume, 证书不丢)

services:
  caddy:
    build:
      context: .
      dockerfile: Dockerfile.caddy
    image: kazuha/caddy-cloudflare:latest
    container_name: wifi-portal-caddy
    restart: unless-stopped

    # 443 对 LAN 开放, 80 给 ACME HTTP-01 fallback + HTTP→HTTPS redirect.
    # 想进一步收紧可以只绑 LAN 网口 IP (比如 "192.168.1.5:443:443"),
    # 不过一般家用 LAN 无所谓.
    ports:
      - "80:80"
      - "443:443"

    environment:
      # Caddy 读这俩来做 DNS-01 和账户注册
      - CLOUDFLARE_API_TOKEN=${CLOUDFLARE_API_TOKEN}
      - PORTAL_HOSTNAME=${PORTAL_HOSTNAME:-wifi.login.example.com}
      - ACME_EMAIL=${ACME_EMAIL}

    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      # 证书 + Caddy 自身状态持久化, 跨重启不重新申请
      - caddy-data:/data
      - caddy-config:/config

    depends_on:
      - portal

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  portal:
    build:
      context: ./portal
      dockerfile: Dockerfile
    image: kazuha/wifi-portal:latest
    container_name: wifi-portal
    restart: unless-stopped

    # 注意: 这里**不**暴露端口到宿主机, Caddy 通过 compose 网络访问就够了.
    # 这样即使有人知道盒子 LAN IP, 也没法直接打 28080 绕过 Caddy.

    env_file:
      - .env

    # Portal 监听 0.0.0.0:28080 容器内, Caddy 通过 service 名访问
    environment:
      - LISTEN_ADDR=0.0.0.0:28080

    # 访客码持久化: bind-mount, 跨 compose rebuild 保留
    volumes:
      - ./data:/data

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:28080/healthz"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

volumes:
  caddy-data:
  caddy-config:
