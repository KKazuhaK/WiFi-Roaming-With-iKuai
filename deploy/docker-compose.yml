# docker-compose.yml
# One compose file, two deployment topologies:
#
#   Mode A - external reverse proxy (default)
#     Leave COMPOSE_PROFILES empty or unset in .env.
#     Start only the portal container, exposed on host 127.0.0.1:28080.
#     TLS is handled by aaPanel Nginx or another host-level reverse proxy.
#     Best for public VPS where aaPanel already manages Nginx / ACME.
#
#   Mode B - built-in Caddy + DNS-01 TLS
#     Set COMPOSE_PROFILES=caddy in .env and fill Caddy variables.
#     Starts an extra caddy container on ${PORTAL_HTTPS_PORT:-28081} with automatic Cloudflare DNS-01 certificates.
#     Best for LAN boxes with iKuai internal DNS hijack and no external Nginx dependency.
#
# Directory layout:
#   /opt/wifi-portal/ (or /opt/wifi-portal-intranet/)
#   ├── docker-compose.yml      <- this file
#   ├── Caddyfile               <- used only by Mode B
#   ├── Dockerfile.caddy        <- built only by Mode B
#   ├── .env                    <- copied from .env.example and filled
#   └── portal/                 <- Portal Go source directory
#
# Common commands:
#   docker compose up -d --build          start containers based on COMPOSE_PROFILES in .env
#   docker compose logs -f portal         watch Portal logs
#   docker compose logs -f caddy          watch Caddy logs in Mode B
#   docker compose restart portal         use after .env changes that affect only Portal
#   docker compose down                   stop containers while keeping named volumes

services:
  portal:
    build:
      context: ./portal
      dockerfile: Dockerfile
    image: kazuha/wifi-portal:latest
    container_name: wifi-portal
    restart: unless-stopped

    # Read environment variables only from .env, not the current shell, to avoid accidental leaks.
    env_file:
      - .env

    environment:
      # Force listen on 0.0.0.0:28080 inside the container. Portal defaults to 127.0.0.1:28080,
      # which only accepts container loopback and breaks docker port publishing / Caddy reverse proxy.
      # The healthcheck uses 127.0.0.1 and would still pass, causing confusing external 502s.
      - LISTEN_ADDR=0.0.0.0:28080

    # Port mapping: container 28080 -> host 127.0.0.1:28080.
    # Binding 127.0.0.1 is important. Mode A uses it from external Nginx; Mode B reaches Portal over
    # the compose network as portal:28080 and does not need this host mapping. Do not expose publicly.
    ports:
      - "127.0.0.1:28080:28080"

    # Persistent files default to /data inside the container. Bind-mount /data to host ./data so
    # docker compose up --build / down / rm do not lose data. Change this line to move storage.
    volumes:
      - ./data:/data

    # Log limit: 10MB per file * 3 files = 30MB cap to protect small VPS disks.
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

    # Healthcheck hits /healthz with wget inside the container. Alpine includes wget by default.
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:28080/healthz"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

  # Caddy starts only in Mode B. Enable it in .env with:
  #   COMPOSE_PROFILES=caddy
  # Then fill CLOUDFLARE_API_TOKEN / ACME_EMAIL / PORTAL_HOSTNAME / PORTAL_HTTPS_PORT.
  caddy:
    profiles: ["caddy"]
    build:
      context: .
      dockerfile: Dockerfile.caddy
    image: kazuha/caddy-cloudflare:latest
    container_name: wifi-portal-caddy
    restart: unless-stopped

    # HTTPS port. Avoid 443 to coexist with other services on LAN boxes. To use 443, change this,
    # remove the port from PUBLIC_URL, and add the no-port Entra Redirect URI. DNS-01 needs no 80.
    ports:
      - "${PORTAL_HTTPS_PORT:-28081}:${PORTAL_HTTPS_PORT:-28081}"

    environment:
      # Use ${VAR:-} so Mode A .env files without these lines do not warn. Mode B must provide real
      # CLOUDFLARE_API_TOKEN and ACME_EMAIL or Caddy certificate issuance will fail and log the error.
      - CLOUDFLARE_API_TOKEN=${CLOUDFLARE_API_TOKEN:-}
      - PORTAL_HOSTNAME=${PORTAL_HOSTNAME:-wifi.login.example.com}
      - PORTAL_HTTPS_PORT=${PORTAL_HTTPS_PORT:-28081}
      - ACME_EMAIL=${ACME_EMAIL:-}

    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      # Persist certificates and Caddy state across restarts.
      - caddy-data:/data
      - caddy-config:/config

    depends_on:
      - portal

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  caddy-data:
  caddy-config:
