# docker-compose.yml (prebuilt-image version)
#
# Differences from deploy/docker-compose.yml:
#   - No build: directive, only image:, assuming images were already docker loaded.
#   - No Caddyfile bind mount, because Caddyfile is baked into the Caddy image.
#   - No references to portal source code, suitable for UI-only Synology / iKuai deployments.
#
# Prerequisite: follow the README in this directory to upload the tarball and docker load both images:
#   kazuha/wifi-portal:latest
#   kazuha/caddy-cloudflare:latest
#
# Place this in /volume1/docker/wifi-portal/ (Synology) or /mnt/xxx/wifi-portal/ (iKuai), put .env
# in the same directory, then point Container Manager / iKuai UI project creation here.

services:
  portal:
    image: kazuha/wifi-portal:latest
    container_name: wifi-portal
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Force listen on 0.0.0.0 so the Caddy container can reach Portal over the compose network.
      # Portal defaults to 127.0.0.1:28080, which still passes healthcheck but makes Caddy return 502.
      - LISTEN_ADDR=0.0.0.0:28080
    # Persistent files default to /data inside the container. Bind-mount it to project ./data so
    # rebuilds keep data. Change this line to move storage.
    volumes:
      - ./data:/data
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:28080/healthz"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

  caddy:
    image: kazuha/caddy-cloudflare:latest
    container_name: wifi-portal-caddy
    restart: unless-stopped
    ports:
      # Default 28081. To use 443, change this plus PORTAL_HTTPS_PORT and PUBLIC_URL in .env.
      # Synology DSM usually owns 443, so do not change it there.
      - "${PORTAL_HTTPS_PORT:-28081}:${PORTAL_HTTPS_PORT:-28081}"
    environment:
      - CLOUDFLARE_API_TOKEN=${CLOUDFLARE_API_TOKEN:-}
      - PORTAL_HOSTNAME=${PORTAL_HOSTNAME:-wifi.login.example.com}
      - PORTAL_HTTPS_PORT=${PORTAL_HTTPS_PORT:-28081}
      - ACME_EMAIL=${ACME_EMAIL:-}
    volumes:
      # Persist certificates and Caddy runtime state across restarts.
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - portal
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  caddy-data:
  caddy-config:
