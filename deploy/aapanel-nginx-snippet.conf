# aapanel-nginx-snippet.conf
#
# 如果你通过 aaPanel UI 配 "反向代理" 配出来的效果不对,
# 或者需要调细节 (比如 proxy_read_timeout), 可以看这里的参考片段。
#
# aaPanel 生成的实际 nginx 配置文件在:
#     /www/server/panel/vhost/nginx/wifi.login.kazuhahub.com.conf
#
# 修改前先备份:
#     cp wifi.login.kazuhahub.com.conf wifi.login.kazuhahub.com.conf.bak
# 改完:
#     nginx -t && systemctl reload nginx  (或 aaPanel 界面里"重载配置")
#
# 只列反向代理关键段, aaPanel 会自动补上 SSL / listen 80 301 重定向等。

location / {
    proxy_pass http://127.0.0.1:28080;
    proxy_http_version 1.1;

    # 保留原始 Host, Portal 里校验 PUBLIC_URL 要用
    proxy_set_header Host $host;

    # 把真实客户端 IP 传给后端. Portal 的限流 (ratelimit.go clientIP) 读这两个 header,
    # 没有的话所有请求都会被归到 127.0.0.1 → 限流失效.
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # OIDC 回调某些情况下 Entra 会走 WebSocket 升级, 保险起见打开
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";

    # Portal 响应很快, 不用很长的读超时
    proxy_connect_timeout 10s;
    proxy_send_timeout 30s;
    proxy_read_timeout 30s;

    # 禁掉缓存, Portal 响应大部分有 no-store 头但再兜一层
    proxy_cache off;
}

# --- 强烈建议: 按路由器 WAN IP 白名单登录相关端点 ---
#
# 连上 Kazuha Hub Roaming SSID 的设备, 发出的 HTTPS 请求全部从 iKuai 路由器 WAN
# 口出, 源 IP 就是路由器的 WAN IP. 也就是说合法请求的源 IP 是**已知且少量**的.
# 公网上任何别的 IP 打 /portal /auth/start 都是扫描器 / 攻击者.
#
# 用 geo 块预定义一个 "信任路由器" 集合, 各个需要保护的 location 引用同一个集合.
# 这段**默认注释掉**, 要用就取消注释 + 填真实 WAN IP.
#
# geo $is_trusted_router {
#     default 0;
#     1.2.3.4        1;       # 办公室路由器 WAN
#     5.6.7.0/29     1;       # 家庭宽带的 /29 段 (有动态 IP 时用段兜)
#     # 2001:db8::/48 1;      # IPv6 段
# }
#
# location = /portal {
#     if ($is_trusted_router = 0) { return 403; }
#     proxy_pass http://127.0.0.1:28080;
#     proxy_http_version 1.1;
#     proxy_set_header Host $host;
#     proxy_set_header X-Real-IP $remote_addr;
#     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
#     proxy_set_header X-Forwarded-Proto $scheme;
# }
#
# location ^~ /auth/ {
#     if ($is_trusted_router = 0) { return 403; }
#     proxy_pass http://127.0.0.1:28080;
#     proxy_http_version 1.1;
#     proxy_set_header Host $host;
#     proxy_set_header X-Real-IP $remote_addr;
#     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
#     proxy_set_header X-Forwarded-Proto $scheme;
# }
#
# 注意:
# - Entra / Duo 回调 (/auth/callback /auth/duo-callback) 浏览器发起, 用户此时还
#   在 Kazuha Hub WiFi, 源 IP 还是路由器 WAN → 仍被白名单允许.
# - /healthz 不白名单, 方便外部监控打探活.
# - /admin 不在这里白名单, 见下一段 (admin 通常不在 WiFi 网里).

# --- 可选: /admin 后台 IP 白名单 ---
#
# /admin 已经走 Entra SSO, 这层只是把扫描器 / 未授权连接在认证之前挡掉, Entra
# 甚至不会被触达. 对小团队是锦上添花.
#
# 下面这段**默认注释掉**, 要用就取消注释并把 allow 换成你的真实 admin IP.
# 注意: 必须在外层 `location /` 之前 (更精确的前缀优先), 否则不生效.
#
# location ^~ /admin {
#     allow 1.2.3.4;            # admin 办公室公网 IP
#     allow 5.6.7.8/32;         # admin 家里公网 IP
#     deny  all;
#
#     # 上面 `location /` 的所有 proxy_* 指令要在这里复制一遍
#     # (Nginx 不会继承外层), 至少要有:
#     proxy_pass http://127.0.0.1:28080;
#     proxy_http_version 1.1;
#     proxy_set_header Host $host;
#     proxy_set_header X-Real-IP $remote_addr;
#     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
#     proxy_set_header X-Forwarded-Proto $scheme;
# }
