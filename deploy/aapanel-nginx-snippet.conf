# aapanel-nginx-snippet.conf
#
# 如果你通过 aaPanel UI 配 "反向代理" 配出来的效果不对,
# 或者需要调细节 (比如 proxy_read_timeout), 可以看这里的参考片段。
#
# aaPanel 生成的实际 nginx 配置文件在:
#     /www/server/panel/vhost/nginx/wifi.login.kazuhahub.com.conf
#
# 修改前先备份:
#     cp wifi.login.kazuhahub.com.conf wifi.login.kazuhahub.com.conf.bak
# 改完:
#     nginx -t && systemctl reload nginx  (或 aaPanel 界面里"重载配置")
#
# 只列反向代理关键段, aaPanel 会自动补上 SSL / listen 80 301 重定向等。

location / {
    proxy_pass http://127.0.0.1:28080;
    proxy_http_version 1.1;

    # 保留原始 Host, Portal 里校验 PUBLIC_URL 要用
    proxy_set_header Host $host;

    # 把真实客户端 IP 传给后端. Portal 目前没用到, 未来可能用来审计
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # OIDC 回调某些情况下 Entra 会走 WebSocket 升级, 保险起见打开
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";

    # Portal 响应很快, 不用很长的读超时
    proxy_connect_timeout 10s;
    proxy_send_timeout 30s;
    proxy_read_timeout 30s;

    # 禁掉缓存, Portal 响应大部分有 no-store 头但再兜一层
    proxy_cache off;
}
