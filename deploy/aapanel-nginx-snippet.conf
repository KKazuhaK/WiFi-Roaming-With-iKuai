# aapanel-nginx-snippet.conf
#
# Reference snippet for cases where aaPanel UI reverse proxy does not produce the desired config,
# or when details such as proxy_read_timeout need tuning.
#
# The actual nginx config generated by aaPanel is under:
#     /www/server/panel/vhost/nginx/wifi.login.kazuhahub.com.conf
#
# Back up before editing:
#     cp wifi.login.kazuhahub.com.conf wifi.login.kazuhahub.com.conf.bak
# After editing:
#     nginx -t && systemctl reload nginx  (or use "reload config" in the aaPanel UI)
#
# Only key reverse-proxy sections are shown; aaPanel adds SSL / listen 80 redirects, etc.

location / {
    proxy_pass http://127.0.0.1:28080;
    proxy_http_version 1.1;

    # Preserve original Host for Portal PUBLIC_URL validation.
    proxy_set_header Host $host;

    # Pass the real client IP to the backend. Portal rate limiting reads these headers; without
    # them, every request is grouped under 127.0.0.1 and IP limits become ineffective.
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Enable WebSocket upgrade defensively for OIDC callback edge cases.
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";

    # Portal responds quickly, so no long read timeout is needed.
    proxy_connect_timeout 10s;
    proxy_send_timeout 30s;
    proxy_read_timeout 30s;

    # Disable cache. Most Portal responses already set no-store; this adds another layer.
    proxy_cache off;
}

# --- Strongly recommended: allowlist login endpoints by router WAN IP ---
#
# Devices on the Kazuha Hub Roaming SSID send HTTPS traffic through the iKuai router WAN, so the
# source IP is the router WAN IP. Valid request sources are known and few; other public IPs hitting
# /portal or /auth/start are scanners or attackers.
#
# Use a geo block to define trusted routers, then reference it from protected locations.
# This is commented out by default; uncomment and fill real WAN IPs to use it.
#
# geo $is_trusted_router {
#     default 0;
#     1.2.3.4        1;       # Office router WAN.
#     5.6.7.0/29     1;       # Home broadband /29 range for dynamic IP fallback.
#     # 2001:db8::/48 1;      # IPv6 range.
# }
#
# location = /portal {
#     if ($is_trusted_router = 0) { return 403; }
#     proxy_pass http://127.0.0.1:28080;
#     proxy_http_version 1.1;
#     proxy_set_header Host $host;
#     proxy_set_header X-Real-IP $remote_addr;
#     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
#     proxy_set_header X-Forwarded-Proto $scheme;
# }
#
# location ^~ /auth/ {
#     if ($is_trusted_router = 0) { return 403; }
#     proxy_pass http://127.0.0.1:28080;
#     proxy_http_version 1.1;
#     proxy_set_header Host $host;
#     proxy_set_header X-Real-IP $remote_addr;
#     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
#     proxy_set_header X-Forwarded-Proto $scheme;
# }
#
# Notes:
# - Entra / Duo callbacks are browser-initiated while the user is still on Kazuha Hub WiFi, so the
#   source IP remains the router WAN and is still allowlisted.
# - /healthz is not allowlisted so external monitoring can check liveness.
# - /admin is not allowlisted here; see next section because admins are often outside WiFi.

# --- Optional: /admin IP allowlist ---
#
# /admin already uses Entra SSO. This layer blocks scanners and unauthorized connections before
# they reach Entra; useful extra hardening for small teams.
#
# The block below is commented out by default. Uncomment it and replace allow entries with real
# admin IPs. It must appear before the outer `location /` because more specific prefixes win.
#
# location ^~ /admin {
#     allow 1.2.3.4;            # Admin office public IP.
#     allow 5.6.7.8/32;         # Admin home public IP.
#     deny  all;
#
#     # Copy every proxy_* directive from `location /` above here; Nginx does not inherit them.
#     # At minimum:
#     proxy_pass http://127.0.0.1:28080;
#     proxy_http_version 1.1;
#     proxy_set_header Host $host;
#     proxy_set_header X-Real-IP $remote_addr;
#     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
#     proxy_set_header X-Forwarded-Proto $scheme;
# }
