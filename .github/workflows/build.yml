name: build

# 每次 push 到任意分支 + PR 时跑, 验证:
#   (1) Go 代码能编译过
#   (2) go vet 没有潜在 bug
#   (3) Docker 镜像能构建出来
#
# 因为你本地没装 Go, 这个 CI 相当于你的编译器.
# 任何一次 push 后打开 GitHub Actions 就能看到绿/红.

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  go-build:
    name: Go build + vet
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: portal
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true
          cache-dependency-path: portal/go.sum

      # 首次 run 时 go.sum 可能还不存在, tidy 一下确保所有依赖 hash 都在
      - name: go mod tidy
        run: go mod tidy

      - name: go vet
        run: go vet ./...

      - name: go build
        run: go build -v ./...

  docker-build:
    name: Docker image build
    runs-on: ubuntu-latest
    needs: go-build
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build image (不推送, 只验证 Dockerfile 写法没错)
        uses: docker/build-push-action@v5
        with:
          context: portal
          file: portal/Dockerfile
          push: false
          tags: wifi-portal:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
