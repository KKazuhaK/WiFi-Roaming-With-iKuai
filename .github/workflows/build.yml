name: build

# Runs on push / PR and verifies:
#   (1) Go build / vet / test, including race detector.
#   (2) govulncheck dependency and stdlib CVE scan.
#   (3) Docker image build.
#
# When Go is not installed locally, this workflow is the compiler and test machine.

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  go-test:
    name: Go build + vet + race test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: portal
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          # Pin to 1.25.10+ because 1.25.9 stdlib has 4 CVEs (html/template/net/http2) that
          # make govulncheck fail. setup-go resolves ">=" to the latest satisfying version.
          go-version: ">=1.25.10"
          cache: true
          cache-dependency-path: portal/go.sum

      - name: go vet
        run: go vet ./...

      - name: go build
        run: go build -v ./...

      - name: go test (race detector)
        run: go test -race -count=1 ./...

      - name: go test (coverage)
        run: go test -count=1 -cover ./...

  vulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: portal
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          # Pin to 1.25.10+ because 1.25.9 stdlib has 4 CVEs (html/template/net/http2) that
          # make govulncheck fail. setup-go resolves ">=" to the latest satisfying version.
          go-version: ">=1.25.10"
          cache: true
          cache-dependency-path: portal/go.sum

      - name: install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: run govulncheck
        run: govulncheck ./...

  docker-build:
    name: Docker image build
    runs-on: ubuntu-latest
    needs: go-test
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build image without push, only verify Dockerfile
        uses: docker/build-push-action@v5
        with:
          context: portal
          file: portal/Dockerfile
          push: false
          tags: wifi-portal:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
