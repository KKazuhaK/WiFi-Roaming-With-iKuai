name: build

# push / PR 时跑, 验证:
#   (1) Go 代码 build / vet / test (含 race detector)
#   (2) govulncheck 扫依赖 CVE
#   (3) Docker 镜像能构建出来
#
# 本地没装 Go 时, 这就是你的编译器 + 测试机.

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  go-test:
    name: Go build + vet + race test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: portal
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true
          cache-dependency-path: portal/go.sum

      - name: go vet
        run: go vet ./...

      - name: go build
        run: go build -v ./...

      - name: go test (race detector)
        run: go test -race -count=1 ./...

      - name: go test (coverage)
        run: go test -count=1 -cover ./...

  vulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: portal
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true
          cache-dependency-path: portal/go.sum

      - name: install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: run govulncheck
        run: govulncheck ./...

  docker-build:
    name: Docker image build
    runs-on: ubuntu-latest
    needs: go-test
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build image (不推送, 只验证 Dockerfile)
        uses: docker/build-push-action@v5
        with:
          context: portal
          file: portal/Dockerfile
          push: false
          tags: wifi-portal:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
