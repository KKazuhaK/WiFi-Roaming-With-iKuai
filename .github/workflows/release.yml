name: release

# Trigger: push a git tag matching v*.*.*.
#
# Flow:
#   1. Cross-compile Go binaries for linux/amd64 and linux/arm64.
#   2. Build and push a multi-arch Docker image to ghcr.io with buildx.
#   3. Save amd64 and arm64 images as tarballs for Mode C offline deployment.
#   4. Compute SHA-256 checksums.
#   5. Create a GitHub Release with binaries, tarballs, and checksums.
#
# Usage:
#   git tag v0.1.0
#   git push origin v0.1.0
# Then check the Releases page for assets.

on:
  push:
    tags:
      - "v*.*.*"

# Release workflow needs contents write for releases and packages write for ghcr.io push.
permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ">=1.25.10"
          cache: true
          cache-dependency-path: portal/go.sum

      # ghcr.io requires lowercase owner while github.repository_owner preserves original casing.
      # Compute it once and place it in env.
      - name: compute lowercase image name
        run: |
          OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "IMAGE=ghcr.io/${OWNER_LC}/wifi-portal" >> $GITHUB_ENV

      - name: prepare dist dir
        run: mkdir -p dist

      # --- Bare Go binaries without Docker dependency ---

      - name: build linux/amd64 binary
        working-directory: portal
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build \
            -trimpath -ldflags="-s -w" \
            -o ../dist/wifi-portal-${{ github.ref_name }}-linux-amd64 .

      - name: build linux/arm64 binary
        working-directory: portal
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build \
            -trimpath -ldflags="-s -w" \
            -o ../dist/wifi-portal-${{ github.ref_name }}-linux-arm64 .

      # --- Docker image: multi-arch push to ghcr.io plus single-arch tarballs ---

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: login to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: build & push multi-arch image
        uses: docker/build-push-action@v5
        with:
          context: portal
          file: portal/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ github.ref_name }}
            ${{ env.IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Mode C (Synology / iKuai UI) needs tarballs; buildx outputs single-arch images locally.
      - name: save amd64 tarball
        run: |
          docker buildx build --platform linux/amd64 \
            --load \
            -t wifi-portal:amd64 \
            -f portal/Dockerfile \
            portal
          docker save wifi-portal:amd64 | gzip > dist/wifi-portal-${{ github.ref_name }}-amd64.tar.gz

      - name: save arm64 tarball
        run: |
          docker buildx build --platform linux/arm64 \
            --load \
            -t wifi-portal:arm64 \
            -f portal/Dockerfile \
            portal
          docker save wifi-portal:arm64 | gzip > dist/wifi-portal-${{ github.ref_name }}-arm64.tar.gz

      # --- Checksums + release ---

      - name: compute SHA-256 checksums
        working-directory: dist
        run: |
          sha256sum * > checksums.txt
          cat checksums.txt

      - name: create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # Tag-triggered push events already carry tag_name; softprops picks it up by default.
          files: |
            dist/wifi-portal-${{ github.ref_name }}-linux-amd64
            dist/wifi-portal-${{ github.ref_name }}-linux-arm64
            dist/wifi-portal-${{ github.ref_name }}-amd64.tar.gz
            dist/wifi-portal-${{ github.ref_name }}-arm64.tar.gz
            dist/checksums.txt
          generate_release_notes: true
          # body can include fixed guidance such as image addresses; generated notes cover commits.
          body: |
            ### Docker image (ghcr.io)
            ```bash
            docker pull ${{ env.IMAGE }}:${{ github.ref_name }}
            # Or latest.
            docker pull ${{ env.IMAGE }}:latest
            ```

            ### Offline deployment (Mode C)
            Download `wifi-portal-<tag>-<arch>.tar.gz` from Assets below:
            ```bash
            gunzip -c wifi-portal-${{ github.ref_name }}-amd64.tar.gz | docker load
            ```

            ### Verify
            ```bash
            sha256sum -c checksums.txt
            ```
