name: release

# 触发: git tag v*.*.* push 上来.
#
# 流程:
#   1. 交叉编译 Go 二进制 linux/amd64 + linux/arm64
#   2. buildx 构建 multi-arch Docker image, 推到 ghcr.io
#   3. 单独把 amd64 / arm64 image 各 save 成 tarball (模式 C 离线部署用)
#   4. 算 SHA-256 checksums
#   5. 创建 GitHub Release, 附二进制 + tarball + checksums
#
# 使用:
#   git tag v0.1.0
#   git push origin v0.1.0
# 完事去 Releases 页面看产物.

on:
  push:
    tags:
      - "v*.*.*"

# release workflow 需要写 contents (创建 release) + packages (推 ghcr.io)
permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ">=1.25.10"
          cache: true
          cache-dependency-path: portal/go.sum

      # ghcr.io 强制 owner 小写, 而 github.repository_owner 保留原大小写
      # (KKazuhaK → 必须用 kkazuhak). 提前算好放进 env.
      - name: compute lowercase image name
        run: |
          OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "IMAGE=ghcr.io/${OWNER_LC}/wifi-portal" >> $GITHUB_ENV

      - name: prepare dist dir
        run: mkdir -p dist

      # --- Go 裸二进制 (无 Docker 依赖, 想直接跑的人用) ---

      - name: build linux/amd64 binary
        working-directory: portal
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build \
            -trimpath -ldflags="-s -w" \
            -o ../dist/wifi-portal-${{ github.ref_name }}-linux-amd64 .

      - name: build linux/arm64 binary
        working-directory: portal
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build \
            -trimpath -ldflags="-s -w" \
            -o ../dist/wifi-portal-${{ github.ref_name }}-linux-arm64 .

      # --- Docker image: multi-arch 推 ghcr.io + 单 arch tarball ---

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: login to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: build & push multi-arch image
        uses: docker/build-push-action@v5
        with:
          context: portal
          file: portal/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ github.ref_name }}
            ${{ env.IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 模式 C (Synology / iKuai UI) 要 tarball — buildx 单 arch 输出到本地
      - name: save amd64 tarball
        run: |
          docker buildx build --platform linux/amd64 \
            --load \
            -t wifi-portal:amd64 \
            -f portal/Dockerfile \
            portal
          docker save wifi-portal:amd64 | gzip > dist/wifi-portal-${{ github.ref_name }}-amd64.tar.gz

      - name: save arm64 tarball
        run: |
          docker buildx build --platform linux/arm64 \
            --load \
            -t wifi-portal:arm64 \
            -f portal/Dockerfile \
            portal
          docker save wifi-portal:arm64 | gzip > dist/wifi-portal-${{ github.ref_name }}-arm64.tar.gz

      # --- checksums + release ---

      - name: compute SHA-256 checksums
        working-directory: dist
        run: |
          sha256sum * > checksums.txt
          cat checksums.txt

      - name: create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # 注意: tag 触发的 push event 已经隐式带 tag_name,softprops 默认拾取
          files: |
            dist/wifi-portal-${{ github.ref_name }}-linux-amd64
            dist/wifi-portal-${{ github.ref_name }}-linux-arm64
            dist/wifi-portal-${{ github.ref_name }}-amd64.tar.gz
            dist/wifi-portal-${{ github.ref_name }}-arm64.tar.gz
            dist/checksums.txt
          generate_release_notes: true
          # body 可以加固定段, 比如 "镜像地址" 提示, 但通常 release notes 自动从
          # commit 拉就够清楚.
          body: |
            ### Docker image (ghcr.io)
            ```bash
            docker pull ${{ env.IMAGE }}:${{ github.ref_name }}
            # 或 latest
            docker pull ${{ env.IMAGE }}:latest
            ```

            ### 离线部署 (模式 C)
            从下方 Assets 下载 `wifi-portal-<tag>-<arch>.tar.gz`:
            ```bash
            gunzip -c wifi-portal-${{ github.ref_name }}-amd64.tar.gz | docker load
            ```

            ### 验证
            ```bash
            sha256sum -c checksums.txt
            ```
