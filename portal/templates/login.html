<!DOCTYPE html>
<html lang="{{ .Lang }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="robots" content="noindex, nofollow">
  <title>{{ printf .S.Title .Brand.Name }}</title>
  <style>
    :root {
      --brand-color: {{ .Brand.Color }};
      --bg: #f6f7f9;
      --surface: #ffffff;
      --text: #111827;
      --text-muted: #6b7280;
      --border: #e5e7eb;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0b0f19;
        --surface: #111827;
        --text: #f3f4f6;
        --text-muted: #9ca3af;
        --border: #1f2937;
      }
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
                   "Hiragino Sans GB", "Microsoft YaHei", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
      min-height: 100vh;
    }
    .card {
      background: var(--surface);
      border-radius: 16px;
      padding: 32px 28px;
      max-width: 420px;
      width: 100%;
      box-shadow: 0 8px 32px rgba(0,0,0,0.06);
      border: 1px solid var(--border);
    }
    .logo {
      width: 56px;
      height: 56px;
      margin: 0 auto 20px;
      display: block;
      border-radius: 12px;
      background: var(--brand-color);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 24px;
    }
    .logo img { width: 100%; height: 100%; border-radius: 12px; object-fit: contain; }
    h1 {
      font-size: 20px;
      margin: 0 0 8px;
      text-align: center;
      font-weight: 600;
    }
    .subtitle {
      text-align: center;
      color: var(--text-muted);
      font-size: 14px;
      margin: 0 0 28px;
      line-height: 1.5;
    }
    .btn {
      display: block;
      width: 100%;
      padding: 14px 20px;
      background: var(--brand-color);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
      text-align: center;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.9; }
    .btn:active { opacity: 0.8; }
    .btn svg { vertical-align: -3px; margin-right: 6px; }
    .device {
      margin-top: 24px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
      font-size: 12px;
      color: var(--text-muted);
      line-height: 1.6;
    }
    .device dl { margin: 0; display: grid; grid-template-columns: auto 1fr; gap: 4px 12px; }
    .device dt { color: var(--text-muted); }
    .device dd { margin: 0; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
    .footer {
      margin-top: 20px;
      text-align: center;
      font-size: 11px;
      color: var(--text-muted);
    }
    .lang-switch {
      text-align: center;
      margin-top: 12px;
      font-size: 12px;
    }
    .lang-switch a {
      color: var(--text-muted);
      text-decoration: none;
      margin: 0 6px;
    }
    .lang-switch a.active { color: var(--brand-color); font-weight: 600; }
  </style>
</head>
<body>
  <main class="card">
    <div class="logo">
      {{ if .Brand.LogoURL }}
        <img src="{{ .Brand.LogoURL }}" alt="{{ .Brand.Name }}">
      {{ else }}
        {{ .Brand.Initial }}
      {{ end }}
    </div>
    <h1>{{ printf .S.Title .Brand.Name }}</h1>
    <p class="subtitle">{{ .S.Subtitle }}</p>

    <a href="/login" class="btn">
      <svg width="18" height="18" viewBox="0 0 21 21" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="1" y="1" width="9" height="9" fill="#f25022"/>
        <rect x="11" y="1" width="9" height="9" fill="#7fba00"/>
        <rect x="1" y="11" width="9" height="9" fill="#00a4ef"/>
        <rect x="11" y="11" width="9" height="9" fill="#ffb900"/>
      </svg>
      {{ .S.SignInButton }}
    </a>

    <div class="device">
      <dl>
        <dt>{{ .S.LabelDevice }}</dt>
        <dd>{{ .DeviceMAC }}</dd>
        <dt>IP</dt>
        <dd>{{ .DeviceIP }}</dd>
      </dl>
    </div>

    <div class="lang-switch">
      <a href="?lang=zh" class="{{ if eq .Lang "zh" }}active{{ end }}">中文</a>
      <a href="?lang=en" class="{{ if eq .Lang "en" }}active{{ end }}">English</a>
    </div>

    <div class="footer">{{ printf .S.Footer .Brand.Name }} · {{ .NowYear }}</div>
  </main>
</body>
</html>
