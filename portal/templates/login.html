<!DOCTYPE html>
<html lang="{{ .Lang }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="robots" content="noindex, nofollow">
  <title>{{ printf .S.Title .Brand.Name }}</title>
  <style>
    :root {
      --brand-color: {{ .Brand.Color }};
      --bg: #f6f7f9;
      --surface: #ffffff;
      --text: #111827;
      --text-muted: #6b7280;
      --border: #e5e7eb;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0b0f19;
        --surface: #111827;
        --text: #f3f4f6;
        --text-muted: #9ca3af;
        --border: #1f2937;
      }
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
                   "Hiragino Sans GB", "Microsoft YaHei", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
      min-height: 100vh;
    }
    .card {
      background: var(--surface);
      border-radius: 16px;
      padding: 32px 28px;
      max-width: 420px;
      width: 100%;
      box-shadow: 0 8px 32px rgba(0,0,0,0.06);
      border: 1px solid var(--border);
    }

    /* 顶部 logo+title 图. 两张图各自在对应主题下显示, 另一张 display:none. */
    .brand-logo {
      display: none;
      margin: 0 auto 24px;
      max-width: 240px;
      max-height: 90px;
      width: auto;
      height: auto;
    }
    .brand-logo.light { display: block; }
    @media (prefers-color-scheme: dark) {
      .brand-logo.light { display: none; }
      .brand-logo.dark  { display: block; }
    }

    h1 {
      font-size: 20px;
      margin: 0 0 8px;
      text-align: center;
      font-weight: 600;
    }
    .subtitle {
      text-align: center;
      color: var(--text-muted);
      font-size: 14px;
      margin: 0 0 28px;
      line-height: 1.5;
    }
    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 12px 20px;
      background: var(--brand-color);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.9; }
    .btn:active { opacity: 0.8; }
    .btn-icon {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      object-fit: cover;
      background: rgba(255,255,255,0.1);
      flex-shrink: 0;
    }
    .footer {
      margin-top: 32px;
      text-align: center;
      font-size: 11px;
      color: var(--text-muted);
    }
    .lang-switch {
      text-align: center;
      margin-top: 16px;
      font-size: 12px;
    }
    .lang-switch a {
      color: var(--text-muted);
      text-decoration: none;
      margin: 0 8px;
    }
    .lang-switch a.active { color: var(--brand-color); font-weight: 600; }
  </style>
</head>
<body>
  <main class="card">
    <img class="brand-logo light" src="/static/logo-title-light.png" alt="{{ .Brand.Name }}">
    <img class="brand-logo dark"  src="/static/logo-title-dark.png"  alt="{{ .Brand.Name }}">

    <h1>{{ printf .S.Title .Brand.Name }}</h1>
    <p class="subtitle">{{ printf .S.Subtitle .Brand.Name }}</p>

    <a href="/login" class="btn">
      <img class="btn-icon" src="/static/HeadPicture.png" alt="">
      <span>{{ printf .S.SignInButton .Brand.Name }}</span>
    </a>

    <div class="lang-switch">
      <a href="?lang=zh-cn" class="{{ if eq .Lang "zh-cn" }}active{{ end }}">{{ .S.LangZHCNLabel }}</a>
      <a href="?lang=zh-tw" class="{{ if eq .Lang "zh-tw" }}active{{ end }}">{{ .S.LangZHTWLabel }}</a>
      <a href="?lang=en"    class="{{ if eq .Lang "en" }}active{{ end }}">{{ .S.LangENLabel }}</a>
    </div>

    <div class="footer">{{ printf .S.Footer .Brand.Name }} · {{ .NowYear }}</div>
  </main>
</body>
</html>
